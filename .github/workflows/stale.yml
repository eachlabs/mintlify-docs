name: Close stale PRs

# Comments on and closes pull requests (drafts included) that have had no
# activity for 14 days. Issues are left untouched. Runs daily.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: stale-prs
  cancel-in-progress: false

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # PRs only — never touch issues.
          days-before-issue-stale: -1
          days-before-issue-close: -1
          # Comment and close a PR in the same run once it hits 14 days idle.
          days-before-pr-stale: 14
          days-before-pr-close: 0
          stale-pr-label: stale
          stale-pr-message: >
            Closing as stale — this PR has had no activity for more than 2 weeks.
            Comment or push new commits to reopen if it's still relevant.
          # Drafts are NOT exempt — they get closed too.
          exempt-draft-pr: false
          operations-per-run: 200
          ascending: true
